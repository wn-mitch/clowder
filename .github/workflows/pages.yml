name: Deploy Writer's Toolkit to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'tools/narrative-editor/**'
      - 'assets/narrative/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/narrative-editor
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tools/narrative-editor/package-lock.json

      - run: npm ci
      - run: npm run build
        env:
          BASE_PATH: /clowder/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: tools/narrative-editor/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
