# Hypothesize spec — ticket 032 §Scope item 1 (revised after Iter 4).
#
# REVISED CURVE — threshold-gated, not always-on (1−hunger)^k.
#
# Iter 1's draft shipped `(1 − hunger)^k` which is non-zero across the
# entire hunger range. Over a 1.34M-tick soak the integrated drain
# killed even well-fed cats (Mocha focal trace: hunger min=0.50, never
# below 0.15, yet "starved" at tick 1.21M from cumulative drain). See
# Iter 4 in starvation-rebalance.md.
#
# Revised model — two curves, leading + trailing:
#
# Damage curve (TRAILING, fires only when really starving):
#   `cliff_factor = ((threshold - hunger) / threshold)^k` for hunger
#   below threshold, 0 above. Threshold 0.15 mirrors the Maslow tier
#   (`critical_hunger_interrupt_threshold`) — health damage starts at
#   the same boundary where the planner already interrupts to send the
#   cat to eat. Brief mid-hunger excursions (hunger 0.3, 0.4) take ZERO
#   damage. Only sustained sub-threshold hunger accumulates damage,
#   back-loaded near zero (parabolic ramp).
#
# Input curve (LEADING, nerve-impulse shape):
#   `HungerUrgency.ramp = ((urgency - 0.6) / 0.4)^k_input` with k_input
#   < 1 → sub-linear, fast-saturating. The cat is at ~92% of full
#   motivation lift by hunger=0.15 (where damage onset begins) instead
#   of ~62%. Cat fights harder for food *before* she bleeds.
#
# Treatment overrides BOTH curves together because they're physically
# coupled: input must lead damage by enough margin or cats die in the
# damage band before the input has saturated. Plus the existing
# HungerUrgency lifts (eat=0.40, hunt=0.20, forage=0.20) which ship
# inert at 0.0 — without these the modifier can't actually motivate.

hypothesis: "Threshold-gated graded cliff (drain only below hunger=0.15) paired with a leading nerve-impulse HungerUrgency ramp produces colony-survivable starvation cascade — drain stays at zero in normal feeding range, input motivation saturates before damage onset, and only cats that genuinely fail to eat take damage"

constants_patch:
  needs:
    starvation_cliff_use_legacy: false
    starvation_cliff_exponent: 2.0
    starvation_cliff_threshold: 0.15
    starvation_attribution_threshold: 0.5
  scoring:
    # Lifts must be non-zero or the modifier has no effect even with
    # a leading curve shape. These are ticket 106 Phase 3 magnitudes.
    hunger_urgency_eat_lift: 0.40
    hunger_urgency_hunt_lift: 0.20
    hunger_urgency_forage_lift: 0.20
    # Sub-linear leading curve — saturates by ~hunger=0.2 instead of 0.0.
    hunger_urgency_curve_exponent: 0.4

prediction:
  metric: deaths_by_cause.Starvation
  direction: decrease
  rough_magnitude_pct: [50, 100]

seeds: [42, 99, 7]
reps: 3
duration: 900
